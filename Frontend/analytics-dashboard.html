<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsightFlow 2.0 - Data Analysis Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="analytics.css">
</head>

<body>
  <div class="container page-shell">
    <div class="header">
      <div class="logo">📊 InsightFlow 2.0</div>
      <div class="header-actions">
        <button class="btn-icon" id="themeToggle" title="Toggle theme">🌙</button>
        <button class="btn btn-secondary" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="main">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="card">
          <h3>New Session</h3>
          <button class="btn btn-primary" style="width: 100%;" id="newSessionBtn">+ Create Session</button>
        </div>

        <div class="card">
          <h3>Recent Sessions</h3>
          <div class="sessions-list" id="sessionsList"></div>
        </div>
      </div>

      <!-- Content -->
      <div class="content">
        <div id="alertContainer"></div>

        <div class="tabs">
          <button class="tab active" data-tab="data-analysis">📊 Data Analysis</button>
          <button class="tab" data-tab="document-chat">📄 Document Chat</button>
          <button class="tab" data-tab="results">📈 Results</button>
        </div>


        <div id="data-analysis" class="tab-content active">
          <div class="card">
            <h3>Upload Data File</h3>
            <div class="upload-zone" id="uploadZone">
              <div class="upload-zone-icon">📁</div>
              <p><strong>Click to upload</strong> or drag and drop</p>
              <p style="font-size: 12px; color: var(--secondary);">CSV, JSON, Excel, TXT, PDF (max 10MB)</p>
            </div>
            <input type="file" id="fileInput" accept=".csv,.json,.txt,.xlsx,.xls,.pdf">
          </div>

          <div class="card" id="documentsCard" style="display: none;">
            <h3>Uploaded Documents</h3>
            <div class="documents-grid" id="documentsList"></div>
          </div>

          <div class="card" id="analysisCard" style="display: none;">
            <h3>Analysis Options</h3>
            <div class="analysis-options" id="analysisOptions"></div>
          </div>
        </div>


        <div id="document-chat" class="tab-content">
          <div class="card">
            <h3>Chat with Document</h3>
            <div class="chat-container">
              <div class="chat-messages" id="chatMessages"></div>
              <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Ask a question about your documents..."
                  autocomplete="off">
                <button id="sendBtn">Send</button>
              </div>
            </div>
          </div>
        </div>


        <div id="results" class="tab-content">
          <div class="card">
            <h3>Analysis Results</h3>
            <div class="results-grid" id="resultsList"></div>
            <p id="noResults" style="text-align: center; color: var(--secondary); margin-top: 20px;">No analysis results
              yet</p>
          </div>
        </div>
      </div>
    </div>
  </div>


  <div id="newSessionModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create New Session</h2>
        <p>Start a new analysis session</p>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Session Title</label>
          <input type="text" id="sessionTitle" placeholder="e.g., Q1 Sales Analysis">
        </div>
        <div class="form-group">
          <label>Mode</label>
          <select id="sessionMode">
            <option value="data_analysis">Data Analysis</option>
            <option value="document_chat">Document Chat</option>
          </select>
        </div>
        <div class="form-group">
          <label>Description (optional)</label>
          <textarea id="sessionDescription" placeholder="Add details about this session..." rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelSessionBtn">Cancel</button>
        <button class="btn btn-primary" id="createSessionBtn">Create</button>
      </div>
    </div>
  </div>

  <script src="analytics-dashboard.js"></script>
</body>

</html>
